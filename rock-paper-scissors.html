<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock - Paper - Scissors</title>
</head>
<body>

    <div>
        <button onclick="rock()" class="rock">Rock</button>
        <button onclick="paper()" class="paper">Paper</button>
        <button onclick="scissors()" class="scissors">Scissors</button>
    </div>

    <script>
        // Compare it using Number
        function rock(){
            let randomNumber = Math.random();
            let computerChoice;
            let message;
                if(randomNumber <= 1/3){
                    computerChoice = 'Rock'
                    message = (`You Picked Rock. Computer Pick ${computerChoice}, You Tie!`);
                }else if(randomNumber > 1/3 && randomNumber <= 2/3){
                    computerChoice = 'Paper';
                    message = (`You Picked Rock. Computer Pick ${computerChoice}, You Lose!`);
                }else{
                    computerChoice = 'Scissors';
                    message = (`You Picked Rock. Computer Pick ${computerChoice}, You Win!`);
                }
                alert(message);
        };

        function paper(){
            let randomNumber = Math.random();
            let computerChoice;
            let message;
                if(randomNumber <= 1/3){
                    computerChoice = 'Rock'
                    message = (`You Picked Paper. Computer Pick ${computerChoice}, You Win!`);
                }else if(randomNumber > 1/3 && randomNumber <= 2/3){
                    computerChoice = 'Paper';
                    message = (`You Picked Paper. Computer Pick ${computerChoice}, You Tie!`);
                }else{
                    computerChoice = 'Scissors';
                    message = (`You Picked Paper. Computer Pick ${computerChoice}, You Lose!`);
                }
                alert(message);
        };
         
        function scissors(){
            let randomNumber = Math.random();
            let computerChoice;
            let message;
                if(randomNumber <= 1/3){
                    computerChoice = 'Rock'
                }else if(randomNumber > 1/3 && randomNumber <= 2/3){
                    computerChoice = 'Paper';
                }else{
                    computerChoice = 'Scissors';
                }
                //alert(message);
                let result;
                if(computerChoice === 'Rock'){
                    result = 'Lose';
                }else if(computerChoice === 'Paper'){
                    result = 'Win';
                }else {
                    result = 'Tie';
                }
                alert(`You Picked Scissors.Computer Pick ${computerChoice}.You ${result}`)
        };
       

    </script>
</body>
</html>
